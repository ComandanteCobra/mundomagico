<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Admin</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Panel administrador</h2>

<input type="text" id="user" placeholder="Usuario">

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p id="error" style="color:red"></p>

</div>

<script>

function login(){

const user = document.getElementById("user").value;
const pass = document.getElementById("pass").value;

if(user === "personajes.comandante" && pass === "CobraPersonajes#2026"){

localStorage.setItem("admin","true");

window.location.href="panel.html";

}else{

document.getElementById("error").innerText="Datos incorrectos";

}

}

</script>

</body>
</html>
