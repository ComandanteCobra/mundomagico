<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<link rel="stylesheet" href="panel.css">

</head>

<body>

<script>
if(localStorage.getItem("admin") !== "true"){
    window.location.href="index.html";
}
</script>

<div class="panel">

    <div class="topbar">
        <h2>⚙️ Panel Administrador</h2>
        <button class="logout" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- PERSONAJES -->
    <section class="card">
        <h3>🎭 Personajes</h3>

        <input type="text" id="nombre" placeholder="Nombre del personaje">
        <input type="file" id="imagen">

        <button onclick="subirPersonaje()">Agregar</button>

        <div id="lista"></div>
    </section>

    <!-- GALERÍA -->
    <section class="card">
        <h3>🖼️ Galería</h3>

        <select id="tipo">
            <option value="imagen">Imagen</option>
            <option value="video">Video</option>
        </select>

        <input type="file" id="archivoGaleria">

        <button onclick="subirGaleria()">Agregar a galería</button>

        <div id="listaGaleria"></div>
    </section>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
